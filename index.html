<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>永續研究之 AI 賦能 · 網頁式簡報</title>
<link rel="stylesheet" href="_ds/warm-terracotta-design-system-b41c841d-cb6d-462c-b3f1-4f660f9da7b9/styles.css">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body { font-family: var(--font-sans); background: var(--surface-page); color: var(--text-body); -webkit-font-smoothing: antialiased; }
  #app-root { height: 100vh; }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: var(--sand-300); border-radius: 999px; border: 2px solid var(--surface-page); }
  ::-webkit-scrollbar-thumb:hover { background: var(--sand-400); }
  a { color: var(--text-link); }
  .slide-anim { animation: slideIn 0.42s var(--ease-out) both; }
  @keyframes slideIn { from { transform: translateY(16px); } to { transform: none; } }
  @media (prefers-reduced-motion: reduce) { .slide-anim { animation: none; } }
  /* 全簡報表格字級放大（覆寫 DataTable 內聯 --text-sm） */
  .wt-table-lg th, .wt-table-lg td { font-size: var(--text-base) !important; padding-top: 14px !important; padding-bottom: 14px !important; }
</style>
</head>

  <div id="app-root"></div>
  <template id="__bundler_thumbnail">

      <text x="50" y="52" font-family="'Noto Sans TC', sans-serif" font-size="30" font-weight="800" fill="#FBF6EF" text-anchor="middle" dominant-baseline="central">永續</text>
    </svg>
